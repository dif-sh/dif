name: release

# Two triggers:
# - `v*` tag push: builds Rust binaries for every target, attaches them to a
#   GitHub release, updates the Homebrew tap, publishes the npm packages.
# - manual dispatch: same flow, useful for re-running a failed release.
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch:

permissions:
  contents: write   # for creating the release + uploading assets
  id-token: write   # for npm provenance

env:
  CARGO_TERM_COLOR: always
  # Force JS actions onto Node 24 ahead of the June 16, 2026 cutover so the
  # release workflow doesn't surface deprecation warnings on every run. The
  # affected actions in this workflow are actions/upload-artifact@v5,
  # actions/download-artifact@v5, and softprops/action-gh-release@v2 — all
  # still on Node 20 internals. Remove this env var once those publish
  # Node-24-native major versions and we bump to them.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # -------------------------------------------------------------------------
  # Build the Rust binary for each target. cargo-dist orchestrates this in
  # production; the matrix below is a hand-rolled fallback so the workflow
  # works even before `cargo dist init` has been run.
  # -------------------------------------------------------------------------
  build-binary:
    name: build dif (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          # Cross-compile x86_64 from the ARM macOS-latest runner. GitHub has
          # been throttling macos-13 (Intel) capacity ahead of full
          # deprecation; jobs can sit unscheduled indefinitely. The Mac SDK
          # is universal and our crates are pure Rust, so this just works.
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          # Build statically-linked musl binaries for Linux. glibc binaries
          # built on ubuntu-latest (glibc 2.39) won't load on Vercel's AL2023
          # (2.34), RHEL 8 (2.28), or any older long-lived runtime. musl-static
          # is the canonical "runs everywhere" answer for Rust CLIs and the
          # crate has no native deps that would interfere.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          key: release-${{ matrix.target }}

      # musl-tools provides musl-gcc, the C linker the Rust musl target shells
      # out to. Needed for both x86_64- and aarch64-linux-musl builds since the
      # arm runner is also glibc-based.
      - name: install musl tools
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: build
        run: cargo build --release -p dif-cli --target ${{ matrix.target }}

      - name: package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p staging/dif-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/dif staging/dif-${{ matrix.target }}/
          cp ../README.md ../LICENSE staging/dif-${{ matrix.target }}/ 2>/dev/null || true
          tar -czf dif-${{ matrix.target }}.tar.gz -C staging dif-${{ matrix.target }}
          shasum -a 256 dif-${{ matrix.target }}.tar.gz > dif-${{ matrix.target }}.tar.gz.sha256

      - name: package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging/dif-${{ matrix.target }} | Out-Null
          Copy-Item target/${{ matrix.target }}/release/dif.exe staging/dif-${{ matrix.target }}/
          Copy-Item ../README.md staging/dif-${{ matrix.target }}/ -ErrorAction SilentlyContinue
          Copy-Item ../LICENSE staging/dif-${{ matrix.target }}/ -ErrorAction SilentlyContinue
          Compress-Archive -Path staging/dif-${{ matrix.target }} -DestinationPath dif-${{ matrix.target }}.zip
          (Get-FileHash dif-${{ matrix.target }}.zip -Algorithm SHA256).Hash | Out-File dif-${{ matrix.target }}.zip.sha256

      - uses: actions/upload-artifact@v5
        with:
          name: dif-${{ matrix.target }}
          path: |
            cli/dif-${{ matrix.target }}.${{ matrix.archive }}
            cli/dif-${{ matrix.target }}.${{ matrix.archive }}.sha256

  # -------------------------------------------------------------------------
  # Create the GitHub release and attach every artifact.
  # -------------------------------------------------------------------------
  release:
    name: github release
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true
      - name: collect
        run: ls -la artifacts
      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # -------------------------------------------------------------------------
  # Publish @dif.sh/cli (the wrapper), @dif.sh/sdk, @dif.sh/react, and
  # @dif.sh/svelte to npm. The wrapper's postinstall will download the matching
  # binary from the release we just cut. The adapters (react, svelte) are
  # published after the sdk so the just-published sdk version exists in the
  # registry for their peerDependency.
  # -------------------------------------------------------------------------
  npm-publish:
    name: npm publish
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: sync version (cli wrapper)
        working-directory: cli/packages/cli
        run: |
          version=${GITHUB_REF_NAME#v}
          npm version "$version" --no-git-tag-version --allow-same-version
      - name: publish wrapper
        working-directory: cli/packages/cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: sync version (sdk)
        working-directory: cli/packages/sdk
        run: |
          version=${GITHUB_REF_NAME#v}
          npm version "$version" --no-git-tag-version --allow-same-version
      - name: build sdk
        working-directory: cli/packages/sdk
        run: |
          npm install --no-audit --no-fund
          npm run build
      - name: publish sdk
        working-directory: cli/packages/sdk
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: sync version (react)
        working-directory: cli/packages/react
        run: |
          version=${GITHUB_REF_NAME#v}
          npm version "$version" --no-git-tag-version --allow-same-version
      - name: build react
        working-directory: cli/packages/react
        run: |
          npm install --no-audit --no-fund
          npm run build
      - name: publish react
        working-directory: cli/packages/react
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: sync version (svelte)
        working-directory: cli/packages/svelte
        run: |
          version=${GITHUB_REF_NAME#v}
          npm version "$version" --no-git-tag-version --allow-same-version
      - name: build svelte
        working-directory: cli/packages/svelte
        run: |
          npm install --no-audit --no-fund
          npm run build
      - name: publish svelte
        working-directory: cli/packages/svelte
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # -------------------------------------------------------------------------
  # Patch dist/homebrew-tap/Formula/dif.rb with the real SHA-256 of each
  # tarball we just released, then open a PR against main. main is a
  # protected branch (PRs + status checks required), so direct pushes from
  # GITHUB_TOKEN are rejected — `gh pr create` is the supported path.
  # The formula stays hand-maintained in-tree until cargo-dist owns the tap.
  # -------------------------------------------------------------------------
  homebrew-formula:
    name: update homebrew formula
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true
      - name: patch formula
        run: |
          version=${GITHUB_REF_NAME#v}
          formula=dist/homebrew-tap/Formula/dif.rb

          sha_arm_darwin=$(awk '{print $1}' artifacts/dif-aarch64-apple-darwin.tar.gz.sha256)
          sha_intel_darwin=$(awk '{print $1}' artifacts/dif-x86_64-apple-darwin.tar.gz.sha256)
          sha_intel_linux=$(awk '{print $1}' artifacts/dif-x86_64-unknown-linux-musl.tar.gz.sha256)
          sha_arm_linux=$(awk '{print $1}' artifacts/dif-aarch64-unknown-linux-musl.tar.gz.sha256)

          sed -i "s|^  version \".*\"|  version \"$version\"|" "$formula"
          sed -i "s|REPLACE_ME_SHA256_AARCH64_DARWIN|$sha_arm_darwin|" "$formula"
          sed -i "s|REPLACE_ME_SHA256_X86_64_DARWIN|$sha_intel_darwin|" "$formula"
          sed -i "s|REPLACE_ME_SHA256_X86_64_LINUX|$sha_intel_linux|" "$formula"
          sed -i "s|REPLACE_ME_SHA256_AARCH64_LINUX|$sha_arm_linux|" "$formula"

          # Idempotent re-runs: replace any prior real SHA on subsequent
          # releases by matching the canonical 64-hex shape next to each url.
          python3 - "$formula" "$sha_arm_darwin" "$sha_intel_darwin" "$sha_intel_linux" "$sha_arm_linux" <<'PY'
          import re, sys
          path, sa_d, si_d, si_l, sa_l = sys.argv[1:6]
          src = open(path).read()
          targets = [
              ("dif-aarch64-apple-darwin.tar.gz", sa_d),
              ("dif-x86_64-apple-darwin.tar.gz",  si_d),
              ("dif-x86_64-unknown-linux-musl.tar.gz", si_l),
              ("dif-aarch64-unknown-linux-musl.tar.gz", sa_l),
          ]
          for fname, sha in targets:
              pat = re.compile(
                  r'(url\s+"[^"]*' + re.escape(fname) + r'"\s*\n\s*sha256\s+")[0-9a-f]{64}(")',
                  re.MULTILINE,
              )
              src = pat.sub(lambda m: m.group(1) + sha + m.group(2), src)
          open(path, "w").write(src)
          PY
      - name: open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- dist/homebrew-tap/Formula/dif.rb; then
            echo "formula already up to date"
            exit 0
          fi
          version=${GITHUB_REF_NAME#v}
          branch="chore/homebrew-${GITHUB_REF_NAME}-shas"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add dist/homebrew-tap/Formula/dif.rb
          git commit -m "chore: update homebrew formula for ${GITHUB_REF_NAME}"
          git push origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore: homebrew formula sha256s for ${GITHUB_REF_NAME}" \
            --body "Auto-generated by the release workflow after v${version} shipped. Patches the four \`sha256\` lines in \`dist/homebrew-tap/Formula/dif.rb\` with the real digests from the just-published release artifacts."
