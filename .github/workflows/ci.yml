name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  sdk:
    name: sdk (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    defaults:
      run:
        working-directory: cli/packages/sdk
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
      - name: install
        run: npm install --no-audit --no-fund
      - name: lint
        run: npm run lint
      - name: test
        run: npm test
      - name: build
        run: npm run build

  # The cross-language anchor: the Rust side regenerates the fixture, the TS
  # side reads it, both must agree. This is the contract.
  cross-language-fixture:
    name: cross-language bucket fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: rust side computes the fixture
        working-directory: cli
        run: cargo test -p dif-core --test bucket_fixture
      - name: ts side verifies it
        working-directory: cli/packages/sdk
        run: |
          npm install --no-audit --no-fund
          npm test
